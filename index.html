<script src="concepts.js"></script>
<script src="questions.js"></script>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NSEC Prep Platform</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

h1 { color: #38bdf8; }

input, button {
  padding: 10px;
  margin: 8px;
  border-radius: 8px;
  border: none;
}

button {
  background: #38bdf8;
  font-weight: bold;
  cursor: pointer;
}

.box {
  display: none;
  background: #1e293b;
  padding: 20px;
  margin-top: 20px;
  border-radius: 12px;
}
</style>
</head>

<body>

<h1>🧪 NSEC Olympiad Prep</h1>

<input id="name" placeholder="Your Name"><br>
<input id="chapter" placeholder="Chapter (e.g. Chemical Bonding)"><br>

<button onclick="start()">Start</button>

<div id="conceptBox" class="box"></div>
<div id="confirmBox" class="box"></div>
<div id="testBox" class="box"></div>
<div id="resultBox" class="box"></div>
<div id="leaderboardBox" class="box"></div>

<script>

// ================= DATA =================



// ================= GLOBAL =================

let currentQuestions = [];
let score = 0;
let timer;
let timeLeft = 60;

// ================= START =================

function start() {
  const chapter = document.getElementById("chapter").value.toLowerCase().trim();

  if (!chapter) return alert("Enter chapter");

  const list = concepts[chapter] || ["Concepts coming soon"];

  document.getElementById("conceptBox").style.display = "block";
  document.getElementById("conceptBox").innerHTML =
    "<h2>📚 Concepts</h2><ul>" +
    list.map(c => "<li>"+c+"</li>").join("") +
    "</ul>";

  document.getElementById("confirmBox").style.display = "block";
  document.getElementById("confirmBox").innerHTML =
    `<h3>Are you sure?</h3>
     <button onclick="startTest('${chapter}')">Yes</button>
     <button onclick="alert('Revise more!')">No</button>`;
}

// ================= TEST =================

function startTest(chapter) {

  if (timer) clearInterval(timer);

  const allQ = questionBank[chapter];

  if (!allQ || allQ.length === 0) {
    alert("No questions yet");
    return;
  }

  score = 0;
  timeLeft = 60;

  currentQuestions = shuffle(allQ).slice(0, 5);

  document.getElementById("testBox").style.display = "block";

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if (timeLeft <= 0) submitTest();
  }, 1000);

  let html = "<h2>⚡ Test</h2>";
  html += "<p>⏱ Time: <span id='timer'>60</span></p>";

  currentQuestions.forEach((q,i) => {
    html += `<p><b>Q${i+1}:</b> ${q.q}</p>`;

    if (q.type === "mcq") {
      q.options.forEach(opt => {
        html += `
        <label>
        <input type="radio" name="q${i}" value="${opt}">
        ${opt}
        </label><br>`;
      });
    } else {
      html += `<input id="q${i}" placeholder="Answer"><br>`;
    }
  });

  html += "<br><button onclick='submitTest()'>Submit</button>";

  document.getElementById("testBox").innerHTML = html;
}

// ================= SUBMIT =================

function submitTest() {

  clearInterval(timer);
  score = 0;

  currentQuestions.forEach((q,i) => {

    let userAns;

    if (q.type === "mcq") {
      const sel = document.querySelector(`input[name="q${i}"]:checked`);
      userAns = sel ? sel.value : "";
    } else {
      userAns = document.getElementById("q"+i).value;
    }

    if (check(userAns, q.answer)) score++;
  });

  showResult();
}

// ================= CHECK =================

function check(user, correct) {

  if (!user) return false;

  if (!isNaN(correct)) {
    return Math.abs(parseFloat(user) - parseFloat(correct)) < 0.01;
  }

  return user.toLowerCase() === correct.toLowerCase();
}

// ================= RESULT =================

function showResult() {

  const name = document.getElementById("name").value || "Anonymous";

  document.getElementById("resultBox").style.display = "block";
  document.getElementById("resultBox").innerHTML =
    `<h2>🏆 Score: ${score}/${currentQuestions.length}</h2>`;

  saveScore(name, score);
  showLeaderboard();
}

// ================= LEADERBOARD =================

function saveScore(name, score) {

  let data = JSON.parse(localStorage.getItem("nsec_scores")) || [];

  data.push({ name, score });

  data.sort((a,b) => b.score - a.score);

  localStorage.setItem("nsec_scores", JSON.stringify(data.slice(0,10)));
}

function showLeaderboard() {

  let data = JSON.parse(localStorage.getItem("nsec_scores")) || [];

  document.getElementById("leaderboardBox").style.display = "block";

  let html = "<h2>📊 Leaderboard</h2>";

  data.forEach((d,i) => {
    html += `<p>${i+1}. ${d.name} - ${d.score}</p>`;
  });

  document.getElementById("leaderboardBox").innerHTML = html;
}

// ================= UTIL =================

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

</script>

</body>
</html>
