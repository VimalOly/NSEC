<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NSEC Prep Platform</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

h1 { color: #38bdf8; }

input, button {
  padding: 10px;
  margin: 8px;
  border-radius: 8px;
  border: none;
}

button {
  background: #38bdf8;
  font-weight: bold;
  cursor: pointer;
}

.box {
  display: none;
  background: #1e293b;
  padding: 20px;
  margin-top: 20px;
  border-radius: 12px;
}
</style>
</head>

<body>

<h1>🧪 NSEC Olympiad Prep</h1>

<input id="name" placeholder="Your Name"><br>
<input id="chapter" placeholder="Chapter (e.g. Chemical Bonding)"><br>

<button onclick="start()">Start</button>

<div id="conceptBox" class="box"></div>
<div id="confirmBox" class="box"></div>
<div id="testBox" class="box"></div>
<div id="resultBox" class="box"></div>
<div id="leaderboardBox" class="box"></div>

<script>

// ================= DATA =================

const concepts = {
  "chemical bonding": [
    "VSEPR Theory",
    "Hybridization",
    "Molecular Orbital Theory",
    "Bond Polarity"
  ],
  "periodic properties": [
    "Atomic Radius",
    "Ionization Energy",
    "Electron Affinity",
    "Electronegativity"
  ]
};

const questionBank = {
  const questionBank = {

"Chemical Bonding": [
{type:"mcq", difficulty:"easy", q:"Shape of NH3?", options:["Linear","Trigonal planar","Trigonal pyramidal","Tetrahedral"], answer:"Trigonal pyramidal"},
{type:"mcq", difficulty:"medium", q:"Hybridization of C in CO2?", options:["sp","sp2","sp3","dsp2"], answer:"sp"},
{type:"mcq", difficulty:"hard", q:"Which molecule has zero dipole moment?", options:["NH3","H2O","CO2","SO2"], answer:"CO2"},
{type:"num", difficulty:"medium", q:"Number of σ bonds in ethane?", answer:"7"},
{type:"num", difficulty:"hard", q:"Lone pairs on oxygen in H2O?", answer:"2"},
{type:"mcq", difficulty:"medium", q:"Bond angle in methane?", options:["90°","109.5°","120°","180°"], answer:"109.5°"},
{type:"mcq", difficulty:"hard", q:"Which follows octet rule violation?", options:["BF3","CH4","NH3","H2O"], answer:"BF3"}
],

"Thermodynamics": [
{type:"mcq", difficulty:"easy", q:"Unit of entropy?", options:["J","J/K","Pa","KJ"], answer:"J/K"},
{type:"mcq", difficulty:"medium", q:"ΔG < 0 implies?", options:["Non-spontaneous","Spontaneous","Equilibrium","None"], answer:"Spontaneous"},
{type:"num", difficulty:"easy", q:"pH of neutral water?", answer:"7"},
{type:"mcq", difficulty:"hard", q:"At equilibrium ΔG equals?", options:["1","0","-1","∞"], answer:"0"},
{type:"mcq", difficulty:"medium", q:"Exothermic process ΔH?", options:["Positive","Negative","Zero","None"], answer:"Negative"}
],

"Equilibrium": [
{type:"mcq", difficulty:"medium", q:"Le Chatelier principle deals with?", options:["Rate","Shift","Energy","Bond"], answer:"Shift"},
{type:"num", difficulty:"easy", q:"pH + pOH =", answer:"14"},
{type:"mcq", difficulty:"hard", q:"Equilibrium constant depends on?", options:["Pressure","Temp","Volume","Catalyst"], answer:"Temp"},
{type:"mcq", difficulty:"medium", q:"Buffer resists change in?", options:["Temp","pH","Pressure","Volume"], answer:"pH"}
],

"Atomic Structure": [
{type:"mcq", difficulty:"easy", q:"Max electrons in p-subshell?", options:["2","6","10","14"], answer:"6"},
{type:"mcq", difficulty:"medium", q:"Quantum number for orbital shape?", options:["n","l","m","s"], answer:"l"},
{type:"num", difficulty:"medium", q:"Orbitals in p subshell?", answer:"3"},
{type:"mcq", difficulty:"hard", q:"Nodes in 2s orbital?", options:["0","1","2","3"], answer:"1"}
],

"Electrochemistry": [
{type:"mcq", difficulty:"easy", q:"Unit of EMF?", options:["Volt","Amp","Ohm","Watt"], answer:"Volt"},
{type:"mcq", difficulty:"medium", q:"Anode process?", options:["Reduction","Oxidation","Neutral","None"], answer:"Oxidation"},
{type:"num", difficulty:"hard", q:"Faraday constant approx?", answer:"96500"},
{type:"mcq", difficulty:"medium", q:"Cathode process?", options:["Oxidation","Reduction","None","Both"], answer:"Reduction"}
],

"Chemical Kinetics": [
{type:"mcq", difficulty:"easy", q:"Rate increases with?", options:["Temp","Color","Mass","Shape"], answer:"Temp"},
{type:"num", difficulty:"medium", q:"Order of zero-order reaction?", answer:"0"},
{type:"mcq", difficulty:"hard", q:"Unit of k (first order)?", options:["s⁻¹","mol","L","None"], answer:"s⁻¹"},
{type:"mcq", difficulty:"medium", q:"Half-life independent of concentration?", options:["Zero","First","Second","None"], answer:"First"}
],

"Organic Chemistry": [
{type:"mcq", difficulty:"easy", q:"Functional group of alcohol?", options:["-OH","-COOH","-CHO","-NH2"], answer:"-OH"},
{type:"mcq", difficulty:"medium", q:"Hybridization in ethene?", options:["sp","sp2","sp3","dsp2"], answer:"sp2"},
{type:"num", difficulty:"easy", q:"Carbon atoms in propane?", answer:"3"},
{type:"mcq", difficulty:"hard", q:"Isomerism means?", options:["Same formula diff structure","Same structure","Same mass","None"], answer:"Same formula diff structure"}
]

};

};

// ================= GLOBAL =================

let currentQuestions = [];
let score = 0;
let timer;
let timeLeft = 60;

// ================= START =================

function start() {
  const chapter = document.getElementById("chapter").value.toLowerCase().trim();

  if (!chapter) return alert("Enter chapter");

  const list = concepts[chapter] || ["Concepts coming soon"];

  document.getElementById("conceptBox").style.display = "block";
  document.getElementById("conceptBox").innerHTML =
    "<h2>📚 Concepts</h2><ul>" +
    list.map(c => "<li>"+c+"</li>").join("") +
    "</ul>";

  document.getElementById("confirmBox").style.display = "block";
  document.getElementById("confirmBox").innerHTML =
    `<h3>Are you sure?</h3>
     <button onclick="startTest('${chapter}')">Yes</button>
     <button onclick="alert('Revise more!')">No</button>`;
}

// ================= TEST =================

function startTest(chapter) {

  if (timer) clearInterval(timer);

  const allQ = questionBank[chapter];

  if (!allQ || allQ.length === 0) {
    alert("No questions yet");
    return;
  }

  score = 0;
  timeLeft = 60;

  currentQuestions = shuffle(allQ).slice(0, 5);

  document.getElementById("testBox").style.display = "block";

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if (timeLeft <= 0) submitTest();
  }, 1000);

  let html = "<h2>⚡ Test</h2>";
  html += "<p>⏱ Time: <span id='timer'>60</span></p>";

  currentQuestions.forEach((q,i) => {
    html += `<p><b>Q${i+1}:</b> ${q.q}</p>`;

    if (q.type === "mcq") {
      q.options.forEach(opt => {
        html += `
        <label>
        <input type="radio" name="q${i}" value="${opt}">
        ${opt}
        </label><br>`;
      });
    } else {
      html += `<input id="q${i}" placeholder="Answer"><br>`;
    }
  });

  html += "<br><button onclick='submitTest()'>Submit</button>";

  document.getElementById("testBox").innerHTML = html;
}

// ================= SUBMIT =================

function submitTest() {

  clearInterval(timer);
  score = 0;

  currentQuestions.forEach((q,i) => {

    let userAns;

    if (q.type === "mcq") {
      const sel = document.querySelector(`input[name="q${i}"]:checked`);
      userAns = sel ? sel.value : "";
    } else {
      userAns = document.getElementById("q"+i).value;
    }

    if (check(userAns, q.answer)) score++;
  });

  showResult();
}

// ================= CHECK =================

function check(user, correct) {

  if (!user) return false;

  if (!isNaN(correct)) {
    return Math.abs(parseFloat(user) - parseFloat(correct)) < 0.01;
  }

  return user.toLowerCase() === correct.toLowerCase();
}

// ================= RESULT =================

function showResult() {

  const name = document.getElementById("name").value || "Anonymous";

  document.getElementById("resultBox").style.display = "block";
  document.getElementById("resultBox").innerHTML =
    `<h2>🏆 Score: ${score}/${currentQuestions.length}</h2>`;

  saveScore(name, score);
  showLeaderboard();
}

// ================= LEADERBOARD =================

function saveScore(name, score) {

  let data = JSON.parse(localStorage.getItem("nsec_scores")) || [];

  data.push({ name, score });

  data.sort((a,b) => b.score - a.score);

  localStorage.setItem("nsec_scores", JSON.stringify(data.slice(0,10)));
}

function showLeaderboard() {

  let data = JSON.parse(localStorage.getItem("nsec_scores")) || [];

  document.getElementById("leaderboardBox").style.display = "block";

  let html = "<h2>📊 Leaderboard</h2>";

  data.forEach((d,i) => {
    html += `<p>${i+1}. ${d.name} - ${d.score}</p>`;
  });

  document.getElementById("leaderboardBox").innerHTML = html;
}

// ================= UTIL =================

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

</script>

</body>
</html>
